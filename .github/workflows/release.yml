name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write       # gh release create
  id-token: write       # Sigstore OIDC for attestation
  attestations: write   # write the attestation record

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify version matches tag
        run: |
          tag="$GITHUB_REF_NAME"
          [ "$(jq -r .version manifest.json)" = "$tag" ] \
            || { echo "::error::manifest.json version != tag ($tag)"; exit 1; }
          [ "$(jq -r .version package.json)" = "$tag" ] \
            || { echo "::error::package.json version != tag ($tag)"; exit 1; }
          [ "$(jq --arg v "$tag" 'has($v)' versions.json)" = "true" ] \
            || { echo "::error::versions.json has no entry for $tag"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint and test
        run: |
          npm run lint
          npm test

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes \
            main.js manifest.json styles.css
