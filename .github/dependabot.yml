# Weekly dependency bumps. Runtime supply chain is near-zero (only tslib);
# what this really guards is the build chain (esbuild/vitest/eslint) that
# produces the attested main.js, plus the pinned action SHAs in workflows.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # 14-day cooldown: only open a bump once the target version has been
    # published >=14 days, so a freshly-pushed (possibly compromised or
    # half-baked) release ages out first. Version updates only — security
    # updates bypass cooldown.
    cooldown:
      default-days: 14

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
